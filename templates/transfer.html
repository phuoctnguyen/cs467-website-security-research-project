<!-- transfer.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Transfer</title>
</head>
<body>
  <p>** This site is for cybersecurity testing purposes. Vulnerable mode is {{ mode }} **</p>
  <h1>Capstone Bank - User Portal</h1>
  <h2>{{ user.username }}'s Session: Make a Transfer</h2>
  <form method="POST" action="/transfer">
    <label for="fromAccount">Transfer funds from Account:</label>
    <select name="from_account" id="fromAccount">
      <option value="checking">Checking</option>
      <option value="savings">Savings</option>
    </select>
    <br><br>

    <label for="toAccount">Move funds to Account:</label>
    <select name="to_account" id="toAccount">
      <option value="checking">Checking</option>
      <option value="savings">Savings</option>
    </select>
    <br><br>

    <label for="amount">Amount to transfer:</label>
    <input type="text" name="amount" id="amount">
    <br><br>

    <button type="submit">Submit</button>
  </form>
  
  {% if message %}
    <p>{{ message }}</p>
  {% endif %}
  <br><br>
  <a href="/">Back to Home</a>
</body>
</html>
